name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 0 * * 1"  
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      
    name: generate

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUMMARY_CARD_TOKEN }}  

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARD_TOKEN }} 
        with:
          USERNAME: SKYLXN
          BRANCH_NAME: main
          UTC_OFFSET: 1
          EXCLUDE: ""
          AUTO_PUSH: true
